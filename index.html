<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="IDENTIO ATLAS — 블러 유리 포스터 에디터. 프로젝트명 클릭으로 3D 글자 블록이 떨어지는 인터랙티브 포스터를 만들고 A3 PDF로 내보내세요.">
  <title>identio poster editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=8">
  <link rel="preload" href="font/Whoami-Regular.otf" as="font" type="font/otf" crossorigin>
</head>
<body>

  <!-- ═══ Export Loading Overlay ═══ -->
  <div class="export-overlay" id="export-overlay">
    <div class="export-spinner"></div>
    <p>Exporting A3 PDF...</p>
  </div>

  <!-- ═══ Editor ═══ -->
  <div class="editor">

    <!-- Body -->
    <div class="editor-body">

      <!-- Canvas Area -->
      <div class="canvas-area">
        <div class="canvas" id="poster-canvas">

          <!-- Layer 1: Falling letter blocks (behind glass) -->
          <div class="layer layer-blocks" id="blocks-layer"></div>

          <!-- Layer 2: Project list (topmost) -->
          <div class="layer layer-projects" id="projects-layer">
            <!-- Generated by script.js -->
          </div>

        </div>
      </div>

      <div class="sidebar" id="sidebar">

        <div class="sidebar-section">
          <h3>Export</h3>
          <div class="export-buttons-group">
            <button class="btn-export" id="export-pdf">PDF</button>
            <button class="btn-export" id="export-jpg">JPG</button>
          </div>
        </div>
        
        <div class="sidebar-section">
          <h3>Background</h3>
          <div class="bg-options-wrapper" style="position: relative; width: 100%;">
            <div class="bg-options">
              <button class="bg-swatch active" data-color="#17171b" style="background-color: #17171b;" title="Default Dark"></button>
              <button class="bg-swatch" data-color="#c9b8e7" style="background-color: #c9b8e7;" title="Pastel Lavender"></button>
              <button class="bg-swatch" data-color="#7d9fce" style="background-color: #7d9fce;" title="Slate Blue"></button>
              <button class="bg-swatch" data-color="#eee5e0" style="background-color: #eee5e0;" title="Warm Stone"></button>
              <button class="bg-picker-container" id="custom-picker-trigger" title="Custom Color" type="button"></button>
            </div>
            
            <!-- Custom Color Picker Popover (Glassmorphism & Black Background) -->
            <div class="custom-color-popover" id="custom-color-popover">
              <div class="popover-body">
                <!-- 1. Color S-V Gradient Square -->
                <div class="color-square-wrapper" id="color-square-wrapper">
                  <canvas id="color-square" width="190" height="110"></canvas>
                  <div class="color-cursor" id="color-cursor"></div>
                </div>
                
                <!-- 2. Controls Row (Preview + Hue Slider) -->
                <div class="popover-controls">
                  <div class="color-preview-circle" id="popover-preview-circle"></div>
                  <div class="hue-slider-wrapper">
                    <input type="range" id="hue-slider" min="0" max="360" value="0">
                  </div>
                </div>
                
                <!-- 3. Inputs Row (HEX & RGB) -->
                <div class="popover-inputs">
                  <div class="input-col" style="flex: 2;">
                    <input type="text" id="hex-val-input" placeholder="HEX" maxlength="7">
                    <label>HEX</label>
                  </div>
                  <div class="input-col">
                    <input type="text" id="r-val-input" placeholder="R" maxlength="3">
                    <label>R</label>
                  </div>
                  <div class="input-col">
                    <input type="text" id="g-val-input" placeholder="G" maxlength="3">
                    <label>G</label>
                  </div>
                  <div class="input-col">
                    <input type="text" id="b-val-input" placeholder="B" maxlength="3">
                    <label>B</label>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>


        <div class="sidebar-section">
          <h3>Blocks</h3>
          <div class="block-count">
            <span>Total Blocks</span>
            <span class="block-count-number" id="block-count">0</span>
          </div>
        </div>

        <div class="sidebar-section">
          <button class="btn-secondary" id="clear-blocks">Clear All Blocks</button>
        </div>

        <div class="sidebar-info">
          <p>
            Click a project name on the poster to drop kinetic letter blocks. Design unpredictable, free-form graphic compositions.
          </p>
        </div>

      </div>

    </div>
  </div>

  <!-- ═══ CDN: Matter.js + html2canvas + jsPDF ═══ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js?v=36"></script>
</body>
</html>
